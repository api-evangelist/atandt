      - 'AT&T: API access via partner / B2B contracts only'
      - No public API pricing published — contact enterprise sales
      - AT&T Business APIs are sold via partner program with custom contracts.
    sources:
      - https://developer.att.com/
    updated: '2026-05-04'
  - type: UseCases
    data:
      - name: Enterprise Digital Transformation
        description: Automate wireline service ordering, qualification, and provisioning for enterprise
          customers through API integration.
      - name: Mobile App Authentication
        description: Use AT&T network signals for frictionless authentication and fraud prevention in
          consumer and business mobile applications.
      - name: IoT and Edge Computing
        description: Connect and manage IoT devices using AT&T's 5G and LTE networks with quality of service
          guarantees for mission-critical applications.
      - name: MVNO Launch and Operations
        description: Launch and operate mobile virtual network services on AT&T's infrastructure using
          TM Forum-standard management APIs.
      - name: Workforce Communication
        description: Integrate AT&T voice and messaging APIs into business workflows for employee and
          customer communication automation.
  - type: Integrations
    data:
      - name: Microsoft Azure
        description: AT&T and Microsoft partnership for 5G and Azure-powered edge computing solutions
          for enterprise applications.
      - name: Cisco
        description: Integration with Cisco enterprise networking and collaboration solutions through
          AT&T's business services.
      - name: IBM
        description: AT&T and IBM partnership for AI-powered network management and cloud services integration.
      - name: TM Forum Open APIs
        description: MVNX and enterprise APIs follow TM Forum Open API standards for telecom BSS/OSS interoperability.
      - name: GSMA CAMARA
        description: AT&T implements CAMARA open-source standard network APIs for cross-carrier developer
          platform interoperability.
  - type: Solutions
    data:
      - name: AT&T Business
        description: Comprehensive connectivity, cloud, cybersecurity, and collaboration solutions for
          small, medium, and enterprise businesses.
      - name: FirstNet
        description: Dedicated broadband network for America's first responders including priority access,
          preemption, and dedicated coverage expansion.
      - name: AT&T Wholesale
        description: Network services for carriers, MVNOs, and resellers including voice, data, and roaming
          services on AT&T's infrastructure.
