aid: atandt
name: AT&T
description: AT&T Inc. is a multinational telecommunications conglomerate providing wireless and wireline
  communications, broadband internet, digital TV, and business services. As a Fortune 100 company, AT&T
  operates one of the largest telecommunications networks in the United States and globally. This profile
  covers AT&T's full API ecosystem including consumer telecommunications APIs, enterprise connectivity
  APIs, and business service management APIs available through AT&T's developer programs.
type: Index
