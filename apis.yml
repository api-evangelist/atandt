apis:
  - aid: atandt:att-wireless-apis
    name: AT&T Wireless APIs
    description: Developer APIs for AT&T's wireless network capabilities including SMS messaging, MMS
      messaging, OAuth authentication, speech-to-text, text-to-speech, in-app messaging, and advertising
      APIs for consumer and business applications.
    humanURL: https://developer.att.com/s/
    baseURL: https://api.att.com
    tags:
      - Wireless
      - SMS
      - MMS
      - Speech
      - Advertising
      - OAuth
    properties:
      - type: Documentation
        url: https://developer.att.com/s/
      - type: Portal
        url: https://developer.att.com/s/
