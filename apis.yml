      - type: GettingStarted
        url: https://developer.att.com/s/
      - type: OpenAPI
        url: openapi/atandt-wireless-apis.yaml
  - aid: atandt:att-network-apis
    name: AT&T 5G Network APIs
    description: CAMARA-standard 5G network APIs available through the AT&T Developer Hub and Network
      API Accelerator Program. Includes SIM Swap detection, Device Status, Number Verification, Quality
      on Demand, Network Insights, and Mobility Threat and Anomaly Detection APIs.
    humanURL: https://devex-web.att.com/developer-hub/
    baseURL: https://api.att.com
    tags:
      - 5G
      - CAMARA
      - Network
      - Device Status
      - SIM Swap
      - Quality of Service
    properties:
      - type: Documentation
        url: https://devex-web.att.com/developer-hub/
      - type: GettingStarted
        url: https://devex-web.att.com/developer-hub/docs/network-api-accelerator-program
      - type: OpenAPI
        url: openapi/atandt-network-apis.yaml
  - aid: atandt:att-enterprise-connectivity-apis
    name: AT&T Enterprise Connectivity APIs
    description: Enterprise-grade APIs for AT&T wireline business services including service qualification,
      quoting, ordering, and provisioning. The Alliance API suite supports automated ordering of AVPN,
      IPBB, ATTPhone, ASE, and AT&T Internet Air for Business services.
    humanURL: https://devex-web.att.com/alliance
    baseURL: https://devex-web.att.com
    tags:
      - Enterprise
      - Wireline
      - AVPN
      - Service Ordering
      - Service Qualification
    properties:
      - type: Documentation
        url: https://devex-web.att.com/alliance
      - type: GettingStarted
        url: https://devex-web.att.com/order/docs/get-started-with-ordering-api
      - type: OpenAPI
        url: openapi/atandt-enterprise-connectivity-apis.yaml
  - aid: atandt:att-mvno-apis
    name: AT&T MVNO APIs
    description: TM Forum-aligned APIs for mobile virtual network operators (MVNOs) on the AT&T network.
      The MVNX API suite covers subscriber activation, number portability, device management, service
      lifecycle management, and balance management following TMF open standards.
    humanURL: https://devex-web.att.com/mvnx
    baseURL: https://devex-web.att.com
    tags:
      - MVNO
      - TM Forum
      - Subscriber Management
      - Porting
    properties:
      - type: Documentation
        url: https://devex-web.att.com/mvnx/docs/mvnx-quickstart
      - type: GettingStarted
        url: https://devex-web.att.com/mvnx/docs/mvnx-quickstart
  - aid: atandt:att-cloud-voice-apis
    name: AT&T Cloud Voice APIs
    description: REST APIs for AT&T Business Voice and Cloud Voice services enabling partners to manage
      service ordering, provisioning, and administration for AT&T's enterprise voice and cloud communication
      products.
    humanURL: https://devex-web.att.com/business-voice-cloud-voice
    baseURL: https://devex-web.att.com
    tags:
      - Voice
      - Cloud
      - Business
      - UCaaS
    properties:
      - type: Documentation
        url: https://devex-web.att.com/business-voice-cloud-voice
  - aid: atandt:att-ebonding-apis
    name: AT&T eBonding APIs
    description: Seamless API integration with AT&T's wireless and wireline IT and ordering systems. eBonding
      APIs enable enterprise partners and resellers to integrate their BSS/OSS systems directly with AT&T's
      backend systems for automated order management and status updates.
    humanURL: https://devex-web.att.com/ebonding-common
    baseURL: https://devex-web.att.com
    tags:
      - eBonding
      - Enterprise
      - BSS
      - OSS
