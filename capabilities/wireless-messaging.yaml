naftiko: "1.0.0-alpha1"

info:
  label: "AT&T Wireless Messaging"
  description: "Workflow capability combining AT&T Wireless APIs for SMS messaging and OAuth authentication. Used by developers building consumer and business messaging applications on the AT&T network."
  tags:
    - AT&T
    - SMS
    - Messaging
    - Wireless
    - OAuth
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ATT_ACCESS_TOKEN: ATT_ACCESS_TOKEN

capability:
  consumes:
    - import: att-wireless-apis
      location: ./shared/wireless-apis.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: att-wireless-messaging-api
      description: "Unified REST API for AT&T wireless SMS messaging."
      resources:
        - path: /v1/auth/token
          name: auth-token
          description: "OAuth token management"
          operations:
            - method: POST
              name: get-token
              description: "Obtain OAuth access token"
              call: "att-wireless-apis.get-access-token"
              with:
                grant_type: "rest.grant_type"
                client_id: "rest.client_id"
                client_secret: "rest.client_secret"
                scope: "rest.scope"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/sms/outbox
          name: sms-outbox
          description: "SMS outbound messaging"
          operations:
            - method: POST
              name: send-sms
              description: "Send SMS message"
              call: "att-wireless-apis.send-sms"
              with:
                address: "rest.address"
                message: "rest.message"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/sms/outbox/{messageId}
          name: sms-status
          description: "SMS delivery status"
          operations:
            - method: GET
              name: get-delivery-status
              description: "Get SMS delivery status"
              call: "att-wireless-apis.get-sms-delivery-status"
              with:
                messageId: "rest.messageId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/sms/inbox/{registrationId}
          name: sms-inbox
          description: "SMS inbound messages"
          operations:
            - method: GET
              name: get-inbound-sms
              description: "Get inbound SMS messages"
              call: "att-wireless-apis.get-inbound-sms"
              with:
                registrationId: "rest.registrationId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: att-wireless-messaging-mcp
      transport: http
      description: "MCP server for AI-assisted AT&T SMS messaging operations."
      tools:
        - name: att-send-sms
          description: "Send an SMS message to one or more recipients via AT&T network"
          hints:
            readOnly: false
            destructive: false
          call: "att-wireless-apis.send-sms"
          with:
            address: "tools.address"
            message: "tools.message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: att-check-sms-delivery
          description: "Check delivery status of a sent AT&T SMS message"
          hints:
            readOnly: true
            idempotent: true
          call: "att-wireless-apis.get-sms-delivery-status"
          with:
            messageId: "tools.messageId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: att-get-inbound-sms
          description: "Retrieve inbound SMS messages for an AT&T registered endpoint"
          hints:
            readOnly: true
            idempotent: true
          call: "att-wireless-apis.get-inbound-sms"
          with:
            registrationId: "tools.registrationId"
          outputParameters:
            - type: object
              mapping: "$."
